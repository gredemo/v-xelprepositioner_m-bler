<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tyska Växelprepositioner</title>
    <style>
        :root { --primary: #4a90e2; --success: #2ecc71; --error: #e74c3c; --bg: #f4f7f6; --text: #2c3e50; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 600px; width: 100%; }
        h1 { text-align: center; color: var(--primary); margin-bottom: 5px; }
        .sub-header { text-align: center; font-size: 0.9rem; margin-bottom: 20px; color: #7f8c8d; }
        .progress-container { background: #eee; border-radius: 10px; height: 10px; margin: 20px 0; overflow: hidden; }
        #progress-bar { background: var(--success); width: 0%; height: 100%; transition: width 0.3s; }
        .task-card { background: #f9f9f9; border-left: 5px solid var(--primary); padding: 20px; margin: 20px 0; border-radius: 4px; position: relative; }
        .hint-icon { cursor: pointer; font-size: 1.2rem; margin-left: 10px; vertical-align: middle; opacity: 0.6; }
        input[type="text"] { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #ddd; border-radius: 6px; font-size: 16px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; }
        .feedback { margin-top: 15px; padding: 15px; border-radius: 6px; display: none; text-align: center; font-weight: bold; }
        .instruction-text { font-style: italic; color: var(--primary); margin-bottom: 10px; display: block; }
    </style>
</head>
<body>

<div class="container">
    <h1>🇩🇪 Wechselpräpositionen</h1>
    <p class="sub-header">Träna på rätt kasus och artikel</p>
    
    <div class="progress-container"><div id="progress-bar"></div></div>

    <div id="quiz-area">
        <div class="task-card">
            <span class="instruction-text" id="quest-text">Hur säger man...</span>
            <p><strong>Verb:</strong> <span id="verb-display">-</span></p>
            <p><strong>Substantiv:</strong> <span id="noun-display">-</span> <span class="hint-icon" onclick="showHint()">✉️</span></p>
            <p><strong>Preposition:</strong> <span id="prep-display">-</span></p>
        </div>

        <input type="text" id="user-answer" placeholder="t.ex. auf den Tisch" autocomplete="off">
        <button id="submit-btn" onclick="checkAnswer()">Kontrollera svar</button>
        <div id="feedback" class="feedback"></div>
    </div>
</div>

<script>
    // Logiska kombinationer för att undvika "hänga upp ett skrivbord"
    const scenarios = [
        { v: "stellen", v_sv: "ställer", prep: "auf", n: "Schreibtisch", g: "m", c: "A" },
        { v: "stehen", v_sv: "står", prep: "auf", n: "Teppich", g: "m", c: "D" },
        { v: "legen", v_sv: "lägger", prep: "på", prep_de: "auf", n: "Bett", g: "n", c: "A" },
        { v: "liegen", v_sv: "ligger", prep: "på", prep_de: "auf", n: "Sofa", g: "n", c: "D" },
        { v: "hängen", v_sv: "hänger upp", prep: "på", prep_de: "an", n: "Wand", g: "f", c: "A" }, // Wand tillagd för logik
        { v: "hängen", v_sv: "hänger (är på)", prep: "på", prep_de: "an", n: "Bild", g: "n", c: "D" },
        { v: "setzen", v_sv: "sätter (sig)", prep: "på", prep_de: "auf", n: "Stuhl", g: "m", c: "A" },
        { v: "sitzen", v_sv: "sitter", prep: "på", prep_de: "Sessel", g: "m", c: "D", prep_de: "in" },
        { v: "stellen", v_sv: "ställer", prep: "i", prep_de: "in", n: "Schrank", g: "m", c: "A" },
        { v: "stehen", v_sv: "står", prep: "i", prep_de: "in", n: "Regal", g: "n", c: "D" },
        { v: "legen", v_sv: "lägger", prep: "på", prep_de: "auf", n: "Kommode", g: "f", c: "A" },
        { v: "sein", v_sv: "är", prep: "under", prep_de: "unter", n: "Tisch", g: "m", c: "D" },
        { v: "stellen", v_sv: "ställer", prep: "bredvid", prep_de: "neben", n: "Fernseher", g: "m", c: "A" },
        { v: "liegen", v_sv: "ligger", prep: "på", prep_de: "auf", n: "Kissen", g: "n", c: "D" }
    ];

    let current = {};
    let score = 0;

    function init() {
        current = scenarios[Math.floor(Math.random() * scenarios.length)];
        document.getElementById('quest-text').innerText = `Hur säger man "${current.v_sv} ${current.prep}..."?`;
        document.getElementById('verb-display').innerText = current.v;
        document.getElementById('noun-display').innerText = current.n;
        document.getElementById('prep-display').innerText = current.prep_de;
        document.getElementById('user-answer').value = "";
        document.getElementById('feedback').style.display = "none";
    }

    function checkAnswer() {
        const user = document.getElementById('user-answer').value.trim().toLowerCase();
        let art = "";
        if (current.c === "A") {
            art = (current.g === "m") ? "den" : (current.g === "f") ? "die" : "das";
        } else {
            art = (current.g === "m" || current.g === "n") ? "dem" : "der";
        }
        
        const correct = `${current.prep_de} ${art} ${current.n}`.toLowerCase();
        const feedback = document.getElementById('feedback');
        
        if (user === correct) {
            feedback.innerHTML = "✅ Snyggt! Rätt svar.";
            feedback.style.background = "#d4edda";
            score++;
            updateProgress();
            setTimeout(init, 1500);
        } else {
            feedback.innerHTML = `❌ Fel. Rätt svar: <b>${correct}</b><br>(Tips: ${current.c === 'A' ? 'Ackusativ' : 'Dativ'} efter '${current.v}')`;
            feedback.style.background = "#f8d7da";
        }
        feedback.style.display = "block";
    }

    function updateProgress() {
        document.getElementById('progress-bar').style.width = (score * 10) + "%";
        if(score >= 10) alert("Bra jobbat! Du har klarat 10 poäng.");
    }

    function showHint() {
        alert(`Genus för ${current.n} är ${current.g === 'm' ? 'maskulinum (der)' : current.g === 'f' ? 'femininum (die)' : 'neutrum (das)'}.`);
    }

    window.onload = init;
</script>

</body>
</html>
